<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURA Studio - Dual Mode</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdn.tailwindcss.com" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.395.0/umd/lucide.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>var require = { paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.46.0/min/vs' } };</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.46.0/min/vs/loader.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap');
    body { font-family: 'Inter', sans-serif; margin: 0; background: #08080f; color: #f1f5f9; overflow: hidden; }
    .font-mono { font-family: 'Fira Code', monospace; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    textarea { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }

    /* Cinematic Ambient Glow */
    .glow-bg {
        position: fixed; top: 50%; left: 50%; width: 120vw; height: 120vh;
        background: radial-gradient(circle at 50% 50%, rgba(79, 70, 229, 0.15) 0%, rgba(139, 92, 246, 0.05) 40%, rgba(8, 8, 15, 0) 70%);
        transform: translate(-50%, -50%); z-index: -1; pointer-events: none;
    }

    /* Glassmorphism Classes */
    .glass-panel {
        background: rgba(15, 15, 25, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    
    .glass-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.2s ease;
    }
    .glass-btn:hover { background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); }

    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; box-shadow: 0 0 10px currentColor; } }

    /* Scan Line Animation */
    .scan-line {
        position: absolute; top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, transparent, rgba(99,102,241,0.8), transparent);
        box-shadow: 0 0 20px rgba(99,102,241,0.5);
        animation: scanAnim 3s ease-in-out infinite alternate;
        z-index: 50;
    }
    @keyframes scanAnim { 0% { top: 0%; } 100% { top: 100%; } }

    /* Anti-Gravity Explorer */
    @keyframes float { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-8px) rotate(0.5deg); } 100% { transform: translateY(0px) rotate(0deg); } }
    .anti-gravity-item { animation: float 6s ease-in-out infinite; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
    .anti-gravity-item:hover { transform: translateY(-5px) scale(1.02) !important; box-shadow: 0 15px 30px rgba(0, 255, 200, 0.15); animation-play-state: paused; }
  </style>

  <!-- Load Frontend Core Layer -->
  <script src="/core/config.js"></script>
  <script src="/core/sessionManager.js"></script>
  <script src="/core/firebaseBridge.js"></script>
  <script src="/core/workspaceResolver.js"></script>
  <script src="/core/permissionsEngine.js"></script>
  <script src="/core/guards.js"></script>
</head>
<body>
  <script>
    // Global Error Catcher for premium diagnostics
    window.onerror = function(message, source, lineno, colno, error) {
      const errBox = document.createElement('div');
      errBox.style.cssText = 'position:fixed; top:20px; left:20px; right:20px; background:rgba(220,38,38,0.95); border:1px solid #ef4444; color:#fff; padding:20px; border-radius:12px; font-family:monospace; font-size:12px; z-index:999999; box-shadow:0 10px 30px rgba(0,0,0,0.5); backdrop-filter:blur(10px); line-height:1.5;';
      errBox.innerHTML = '<div style="font-weight:bold; font-size:14px; margin-bottom:8px; display:flex; align-items:center; gap:8px;">⚠️ AURA System Crash Log</div>' + 
                         '<div><strong>Message:</strong> ' + message + '</div>' +
                         '<div style="margin-top:4px;"><strong>Source:</strong> ' + source + '</div>' +
                         '<div style="margin-top:4px;"><strong>Line:</strong> ' + lineno + ' | <strong>Column:</strong> ' + colno + '</div>';
      document.body.appendChild(errBox);
      document.body.style.display = 'block'; // Ensure body is visible to show error
    };

    // Enforce Sovereign Identity Guard immediately before rendering OS
    window.AuraGuards.requireAuth();
  </script>
  <div class="glow-bg"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const MonacoEditor = ({ value, onChange }) => {
      const divRef = useRef(null);
      const editorRef = useRef(null);

      useEffect(() => {
        if (window.require) {
          window.require(['vs/editor/editor.main'], function() {
            if (divRef.current && !editorRef.current) {
              editorRef.current = window.monaco.editor.create(divRef.current, {
                value: value,
                language: 'typescript',
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 13,
                fontFamily: "'Fira Code', monospace",
                padding: { top: 16, bottom: 16 },
                scrollBeyondLastLine: false,
                overviewRulerBorder: false,
                hideCursorInOverviewRuler: true,
                renderLineHighlight: 'none',
                scrollbar: {
                  vertical: 'auto',
                  horizontal: 'auto'
                }
              });

              editorRef.current.onDidChangeModelContent(() => {
                const val = editorRef.current.getValue();
                onChange(val);
              });
            }
          });
        }
        return () => {
          if (editorRef.current) {
            editorRef.current.dispose();
            editorRef.current = null;
          }
        }
      }, []);

      useEffect(() => {
        if (editorRef.current && value !== editorRef.current.getValue()) {
          editorRef.current.setValue(value);
        }
      }, [value]);

      return <div className="absolute inset-0 bg-[#1e1e1e]" ref={divRef}></div>;
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
      return <i data-lucide={name} className={className}></i>;
    };

    function FileNode({ node, activeFile, onSelectFile, depth = 0 }) {
      const [isOpen, setIsOpen] = useState(false);
      const isSelected = activeFile === node.path;
      const paddingLeft = `${depth * 12 + 6}px`;

      if (node.isDir) {
        return (
          <div>
            <div 
              onClick={() => setIsOpen(!isOpen)} 
              className="flex items-center gap-2 p-1.5 hover:bg-white/5 rounded cursor-pointer text-gray-300 select-none"
              style={{ paddingLeft }}
            >
              <Icon 
                name={isOpen ? "folder-open" : "folder"} 
                className={`w-4 h-4 shrink-0 ${isOpen ? "text-indigo-400" : "text-gray-500"}`} 
              /> 
              <span className="truncate text-xs font-semibold">{node.name}</span>
            </div>
            {isOpen && node.children && (
              <div className="border-l border-white/5 ml-3">
                {node.children.map((child, i) => (
                  <FileNode 
                    key={i} 
                    node={child} 
                    activeFile={activeFile} 
                    onSelectFile={onSelectFile} 
                    depth={depth + 1} 
                  />
                ))}
              </div>
            )}
          </div>
        );
      } else {
        const ext = node.name.split('.').pop();
        const iconName = 
          ext === 'json' ? 'file-json' : 
          ext === 'html' ? 'file-code' : 
          ext === 'js' || ext === 'ts' || ext === 'tsx' ? 'file-code-2' : 
          ext === 'md' ? 'file-text' : 'file';
        
        const iconColor = 
          isSelected ? "text-indigo-400" : 
          iconName === 'file-json' ? "text-amber-500/80" :
          iconName === 'file-code' ? "text-cyan-400" :
          iconName === 'file-code-2' ? "text-indigo-400" : "text-gray-500";

        return (
          <div 
            onClick={() => onSelectFile(node.path)} 
            className={`flex items-center gap-2 p-1.5 rounded cursor-pointer select-none text-xs ${
              isSelected ? "bg-indigo-500/20 text-indigo-200 font-bold border border-indigo-500/20 shadow-[inset_0_0_10px_rgba(99,102,241,0.1)]" : "text-gray-400 hover:bg-white/5 hover:text-gray-200"
            }`}
            style={{ paddingLeft }}
          >
            <Icon name={iconName} className={`w-4 h-4 shrink-0 ${iconColor}`} /> 
            <span className="truncate">{node.name}</span>
          </div>
        );
      }
    }

    const TOOLS = [
      { id: 'editor', name: 'Code Editor', icon: 'code-2', section: 'Core' },
      { id: 'integrations', name: 'Integrations', icon: 'layers', section: 'Core' },
      { id: 'database', name: 'Database', icon: 'database', section: 'Suggested' },
      { id: 'storage', name: 'App Storage', icon: 'hard-drive', section: 'Suggested' },
      { id: 'auth', name: 'Auth', icon: 'users', section: 'Suggested' },
      { id: 'security', name: 'Security Center', icon: 'shield-check', section: 'Suggested' },
      { id: 'secrets', name: 'Secrets', icon: 'key', section: 'Suggested' },
      { id: 'skills', name: 'Agent Skills', icon: 'wrench', section: 'Suggested' },
      { id: 'analytics', name: 'Analytics', icon: 'bar-chart', section: 'Suggested' },
      { id: 'canvas', name: 'Canvas', icon: 'palette', section: 'Suggested' },
      { id: 'validation', name: 'Validation', icon: 'check-circle', section: 'Suggested' },
    ];

    const MOCK_SCHEMA = [
      { name: 'active_sessions', rows: 12, size: '16 KB' },
      { name: 'monthly_usage', rows: 2450, size: '1.2 MB' },
      { name: 'system_logs', rows: 8960, size: '4.5 MB' },
      { name: 'billing_plans', rows: 4, size: '8 KB' },
      { name: 'api_requests', rows: 832, size: '256 KB' },
      { name: 'compute_usage', rows: 142, size: '64 KB' },
      { name: 'discount_codes', rows: 15, size: '16 KB' },
      { name: 'connected_devices', rows: 78, size: '32 KB' },
      { name: 'app_users', rows: 523, size: '128 KB' },
      { name: 'tenant_accounts', rows: 22, size: '24 KB' },
    ];

    const generateMockData = (tableName, numRows) => {
      const rows = [];
      const columns = ['id', 'created_at', 'status'];
      
      if (tableName.includes('users') || tableName.includes('accounts')) {
        columns.push('email', 'name', 'last_login');
      } else if (tableName.includes('billing') || tableName.includes('usage')) {
        columns.push('amount', 'currency', 'billing_period');
      } else {
        columns.push('reference_id', 'metadata');
      }

      for (let i = 0; i < Math.min(numRows, 50); i++) {
        const row = {
          id: 'rc_' + Math.random().toString(36).substr(2, 9),
          created_at: new Date(Date.now() - Math.random() * 10000000000).toISOString().split('T')[0],
          status: Math.random() > 0.2 ? 'active' : 'inactive',
        };
        if (columns.includes('email')) {
          row.email = "user" + i + "@project.local";
          row.name = "Test User " + i;
          row.last_login = '2026-05-27';
        }
        if (columns.includes('amount')) {
          row.amount = (Math.random() * 100).toFixed(2);
          row.currency = 'USD';
          row.billing_period = 'May 2026';
        }
        if (columns.includes('reference_id')) {
          row.reference_id = 'ref_' + Math.floor(Math.random() * 10000);
          row.metadata = '{"source": "api"}';
        }
        rows.push(row);
      }
      return { columns, rows };
    };

    function App() {
      const [mode, setMode] = useState('build'); // 'build' | 'audit'
      const [activeWorkspace, setActiveWorkspace] = useState('editor');
      const [dbTab, setDbTab] = useState('overview');
      const [selectedDbTable, setSelectedDbTable] = useState(MOCK_SCHEMA[0].name);
      const [dbSearch, setDbSearch] = useState('');
      const [dbLoading, setDbLoading] = useState(false);
      const [copiedUrl, setCopiedUrl] = useState(false);
      const [authTab, setAuthTab] = useState('users');
      const [chatInput, setChatInput] = useState('');
      const [chat, setChat] = useState([
        { role: 'pebble', text: "AURA Sovereign Coding Studio Online. Select any repository file to start live editing, or type '/run <command>' to execute terminal commands on your system!" }
      ]);
      const chatEndRef = useRef(null);

      // Sovereign IDE States
      const [files, setFiles] = useState([]);
      const [activeFile, setActiveFile] = useState(null);
      const [editorContent, setEditorContent] = useState("");
      const [isSaving, setIsSaving] = useState(false);
      const [toast, setToast] = useState({ active: false, text: "" });

      // Audit Mode State
      const [isScanning, setIsScanning] = useState(false);
      const [scanProgress, setScanProgress] = useState(0);
      const [toolStatus, setToolStatus] = useState(
        TOOLS.reduce((acc, tool) => ({ ...acc, [tool.id]: 'idle' }), {})
      );
      const [auditLogs, setAuditLogs] = useState([]);

      const loadFiles = async () => {
        try {
          const res = await fetch('/api/studio/files');
          if (res.ok) {
            const data = await res.json();
            setFiles(data);
          }
        } catch (err) {
          console.warn("Failed to load local file tree.");
        }
      };

      useEffect(() => {
        loadFiles();
      }, []);

      const handleSelectFile = async (filePath) => {
        try {
          const res = await fetch(`/api/studio/file?path=${encodeURIComponent(filePath)}`);
          if (res.ok) {
            const content = await res.text();
            setActiveFile(filePath);
            setEditorContent(content);
          }
        } catch (err) {
          console.error("Failed to load file content.");
        }
      };

      const handleSaveFile = async () => {
        if (!activeFile) return;
        setIsSaving(true);
        try {
          const res = await fetch('/api/studio/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path: activeFile, content: editorContent })
          });
          if (res.ok) {
            showToastMessage("Sovereign File Sync: Complete!");
            loadFiles();
          }
        } catch (err) {
          console.error("Failed to save file.");
        } finally {
          setIsSaving(false);
        }
      };

      const showToastMessage = (text) => {
        setToast({ active: true, text });
        setTimeout(() => setToast({ active: false, text: "" }), 3000);
      };

      useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [chat]);

      const handleSendMessage = (e) => {
        if ((e.key === 'Enter' || e.type === 'click') && chatInput.trim()) {
          const userMsg = chatInput.trim();
          setChat(prev => [...prev, { role: 'user', text: userMsg }]);
          setChatInput('');
          
          if (userMsg.startsWith('/cmd ') || userMsg.startsWith('/run ')) {
            const command = userMsg.slice(5).trim();
            setTimeout(async () => {
              setChat(prev => [...prev, { role: 'pebble', text: `Executing system command: \`${command}\`...` }]);
              try {
                const res = await fetch('/api/studio/terminal', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ command })
                });
                if (res.ok) {
                  const data = await res.json();
                  const output = data.stdout || data.stderr || `Command returned with code ${data.code}`;
                  setChat(prev => [...prev, { role: 'pebble', text: output }]);
                } else {
                  const errMsg = await res.text();
                  setChat(prev => [...prev, { role: 'pebble', text: `Error: ${errMsg}` }]);
                }
              } catch (err) {
                setChat(prev => [...prev, { role: 'pebble', text: `Failed to execute command: ${err.message}` }]);
              }
            }, 400);
          } else {
            setTimeout(async () => {
              try {
                const res = await fetch('https://us-central1-studio-5530652813-f1738.cloudfunctions.net/georgeChat', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ message: userMsg, history: chat.map(c => ({ role: c.role === 'pebble' ? 'assistant' : 'user', text: c.text })) })
                }).catch(() => null);

                if (res && res.ok) {
                  const data = await res.json();
                  setChat(prev => [...prev, { role: 'pebble', text: data.text }]);
                } else {
                  setChat(prev => [...prev, { role: 'pebble', text: "Lasso Core Memory Sync: Success. Ensure you add GEMINI_API_KEY to functions/.env for active chat triggers." }]);
                }
              } catch (err) {
                setChat(prev => [...prev, { role: 'pebble', text: "Lasso Memory updated. Background process synced." }]);
              }
            }, 800);
          }
        }
      };

      const handleFixWithPebble = () => {
        setMode('build');
        setActiveWorkspace('auth');
        setTimeout(() => {
          setChat(prev => [...prev, { role: 'pebble', text: "I've analyzed the auth issue. We have two Auth systems here: one using Firebase Auth in the main app, and a separate custom JWT session manager inside the /admin route. They are both trying to manage the user state, which causes conflicts. Should I merge the /admin route to use the main Firebase Auth path so we don't break the app?" }]);
        }, 500);
      };

      const startAuditScan = () => {
        setIsScanning(true);
        setScanProgress(0);
        setAuditLogs([]);
        const statuses = { ...toolStatus };
        
        // Reset all
        Object.keys(statuses).forEach(k => statuses[k] = 'idle');
        setToolStatus({...statuses});

        let progress = 0;
        const interval = setInterval(() => {
          progress += 5;
          setScanProgress(progress);

          // Simulated Scanning logic
          if (progress === 10) { statuses.database = 'scanning'; statuses.storage = 'scanning'; setAuditLogs(p => [...p, "Phase 1: Mapping Database schemas and Object Storage..."]); }
          if (progress === 30) { statuses.database = 'healthy'; statuses.storage = 'healthy'; statuses.auth = 'scanning'; setAuditLogs(p => [...p, "Database: Healthy. No orphaned tables. Storage: Secured.", "Phase 2: Verifying Authentication Integrity..."]); }
          if (progress === 50) { statuses.auth = 'warning'; statuses.security = 'scanning'; statuses.secrets = 'scanning'; setAuditLogs(p => [...p, "Auth: [WARNING] Duplicate session manager detected in route /admin.", "Phase 3: Deep checking Security Center and Vault Secrets..."]); }
          if (progress === 70) { statuses.security = 'healthy'; statuses.secrets = 'healthy'; statuses.editor = 'scanning'; statuses.integrations = 'scanning'; setAuditLogs(p => [...p, "Secrets: Vault locked. No exposed keys. Security: Passing.", "Phase 4: Scanning codebase for Ghost Logic & Dependency Conflicts..."]); }
          if (progress === 90) { statuses.editor = 'healthy'; statuses.integrations = 'healthy'; statuses.skills = 'healthy'; statuses.canvas = 'healthy'; statuses.validation = 'healthy'; statuses.analytics = 'healthy'; setAuditLogs(p => [...p, "Dependencies: Optimized. Ghost Logic: None detected.", "Finalizing System Health Report..."]); }

          setToolStatus({...statuses});

          if (progress >= 100) {
            clearInterval(interval);
            setIsScanning(false);
            setAuditLogs(p => [...p, "SCAN COMPLETE. Architecture Integrity Validated. 1 Warning found."]);
          }
        }, 300);
      };

      const toggleMode = (newMode) => {
        setMode(newMode);
        if (newMode === 'audit') {
          setTimeout(startAuditScan, 500);
        }
      };

      const renderStatusDot = (status) => {
        if (status === 'idle') return <div className="w-2 h-2 rounded-full bg-gray-700"></div>;
        if (status === 'scanning') return <div className="w-2 h-2 rounded-full bg-blue-500 pulse-dot shadow-[0_0_8px_#3b82f6]"></div>;
        if (status === 'healthy') return <div className="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></div>;
        if (status === 'warning') return <div className="w-2 h-2 rounded-full bg-amber-500 shadow-[0_0_8px_#f59e0b]"></div>;
        if (status === 'error') return <div className="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]"></div>;
      };

      const renderBuildWorkspace = () => (
        <div className="flex-1 glass-panel m-4 mr-2 rounded-2xl flex overflow-hidden relative">
            {toast.active && (
              <div className="absolute top-4 right-4 z-50 bg-[#0c0a20] border border-teal-500/30 text-teal-300 text-xs px-4 py-2.5 rounded-xl shadow-[0_0_20px_rgba(20,185,129,0.2)] animate-bounce flex items-center gap-2">
                <Icon name="check-circle-2" className="text-teal-400" />
                <span>{toast.text}</span>
              </div>
            )}
            
            {/* File Tree Sidebar */}
            <div className="w-56 border-r border-white/10 bg-black/20 flex flex-col shrink-0">
              <div className="h-12 border-b border-white/10 flex items-center px-4 shrink-0 justify-between">
                <span className="text-xs font-bold text-gray-300 uppercase tracking-widest">Repository</span>
                <button 
                  onClick={loadFiles}
                  className="text-[10px] bg-indigo-650/40 hover:bg-indigo-500 border border-indigo-500/30 text-white px-2 py-1 rounded transition-colors flex items-center gap-1 font-bold"
                  title="Reload Local File System"
                >
                  <Icon name="refresh-cw" className="w-3 h-3" /> Sync
                </button>
              </div>
              <div className="flex-1 overflow-y-auto p-3 text-sm text-gray-400 font-mono hide-scrollbar">
                {files.length > 0 ? (
                  files.map((node, i) => (
                    <FileNode 
                      key={i} 
                      node={node} 
                      activeFile={activeFile} 
                      onSelectFile={handleSelectFile} 
                    />
                  ))
                ) : (
                  <div className="text-[10px] text-center text-gray-500 py-8 select-none">
                    No files loaded. Run server on localhost.
                  </div>
                )}
              </div>
            </div>

            {/* Editor Area */}
            <div className="flex-1 flex flex-col min-w-0 bg-[#1e1e1e]">
              <div className="h-12 border-b border-black/50 flex items-center justify-between px-4 bg-[#1e1e1e] shrink-0 shadow-sm z-10">
                <div className="flex items-center">
                  <Icon name="code-2" className="text-indigo-400 mr-2" />
                  <span className="text-xs bg-indigo-500/10 text-indigo-300 px-2 py-1 rounded border border-indigo-500/20 font-mono tracking-wide">
                    {activeFile || "Sovereign Editor"}
                  </span>
                </div>
                {activeFile && (
                  <button 
                    onClick={handleSaveFile}
                    className={`text-[10px] uppercase font-bold tracking-wider px-3.5 py-1.5 rounded-lg border transition-all flex items-center gap-1.5 ${
                      isSaving 
                        ? 'bg-indigo-500/10 border-indigo-500/30 text-indigo-300' 
                        : 'bg-indigo-600 border-indigo-500 hover:bg-indigo-500 text-white shadow-[0_0_15px_rgba(99,102,241,0.35)]'
                    }`}
                  >
                    {isSaving ? (
                      <>
                        <Icon name="loader-2" className="w-3.5 h-3.5 animate-spin" />
                        Saving...
                      </>
                    ) : (
                      <>

            </div>

            {/* Dynamic Center Area based on Mode */}
            {mode === 'build' ? (
              <div className="flex-1 flex w-full h-full overflow-hidden">
                <div className="flex-1 flex flex-col min-w-0">
                  {activeWorkspace === 'editor' ? renderBuildWorkspace() : activeWorkspace === 'database' ? renderDatabaseWorkspace() : activeWorkspace === 'auth' ? renderAuthWorkspace() : activeWorkspace === 'storage' ? renderStorageWorkspace() : renderIncomingWorkspace()}
                </div>
                {renderPersistentRightPanel()}
              </div>
            ) : renderAuditWorkspace()}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
